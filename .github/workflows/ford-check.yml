name: Ford NYC Screening Monitor

on:
  schedule:
    # Monday 14:00 UTC = 9am ET (DST) / 10am ET (EST)
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      baseline:
        description: "Populate state without sending notifications"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ford-nyc-monitor/requirements.txt

      - name: Install dependencies
        run: pip install -r ford-nyc-monitor/requirements.txt

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cd ford-nyc-monitor
          ARGS=""
          if [ "${{ github.event.inputs.baseline }}" = "true" ]; then
            ARGS="--baseline"
          fi
          python -m src.main $ARGS

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ford-nyc-monitor/state/notified.json
          git diff --cached --quiet || git commit -m "Update ford monitor state"
          git push
