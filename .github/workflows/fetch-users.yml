name: Fetch Letterboxd Users

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: 'Comma-separated Letterboxd usernames'
        required: true
        default: 'onthebay,ben2610,soham3'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Fetch user data
        run: |
          python3 - <<'PYEOF'
          import json, time
          from concurrent.futures import ThreadPoolExecutor
          from letterboxdpy.user import User

          def fetch_user(username):
              print(f"Fetching {username}...", flush=True)
              user = User(username)
              with ThreadPoolExecutor(max_workers=2) as pool:
                  diary_future = pool.submit(user.get_diary)
                  films_future = pool.submit(user.get_films)
                  diary = diary_future.result()
                  all_films = films_future.result()

              # Debug: show structure
              entries = diary.get("entries", {})
              if entries:
                  first_key = next(iter(entries))
                  print(f"  diary entry type: {type(entries[first_key])}", flush=True)

              diary_entries = []
              for log_id, entry in entries.items():
                  if not isinstance(entry, dict):
                      continue
                  rating = entry.get("actions", {}).get("rating")
                  date = entry.get("date", {})
                  diary_entries.append({
                      "name": entry.get("name"),
                      "year": entry.get("release"),
                      "slug": entry.get("slug", ""),
                      "rating": rating,
                      "review": entry.get("actions", {}).get("review", False),
                      "date": f"{date.get('year', '')}-{date.get('month', 0):02d}-{date.get('day', 0):02d}" if date else None,
                  })

              rated_films = []
              movies = all_films.get("movies", {})
              if movies:
                  first_key = next(iter(movies))
                  print(f"  films entry type: {type(movies[first_key])}", flush=True)

              for slug, film in movies.items():
                  if not isinstance(film, dict):
                      continue
                  rating = film.get("rating")
                  if rating is not None:
                      rated_films.append({
                          "name": film.get("name"),
                          "year": film.get("year"),
                          "slug": slug,
                          "rating": rating,
                      })

              print(f"  {username}: {len(diary_entries)} diary, {len(rated_films)} rated", flush=True)
              return {
                  "username": username,
                  "diary_count": len(diary_entries),
                  "rated_count": len(rated_films),
                  "diary": diary_entries,
                  "rated_films": sorted(rated_films, key=lambda f: f["rating"], reverse=True),
              }

          usernames = [u.strip() for u in "${{ github.event.inputs.usernames }}".split(",")]
          results = []
          for u in usernames:
              results.append(fetch_user(u))
              if u != usernames[-1]:
                  time.sleep(3)

          with open("user_data.json", "w") as f:
              json.dump(results, f, indent=2)
          print("Done!")
          PYEOF
      - uses: actions/upload-artifact@v4
        with:
          name: letterboxd-user-data
          path: user_data.json
