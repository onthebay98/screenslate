name: Fetch Letterboxd Users

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: 'Comma-separated Letterboxd usernames'
        required: true
        default: 'onthebay,ben2610,soham3'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Fetch user data
        run: |
          python3 - <<'PYEOF'
          import json, time, traceback
          from letterboxdpy.user import User

          def parse_date(date_val):
              """Handle both dict and string date formats from letterboxdpy."""
              if isinstance(date_val, dict):
                  return f"{date_val.get('year', '')}-{date_val.get('month', 0):02d}-{date_val.get('day', 0):02d}"
              if isinstance(date_val, str):
                  return date_val[:10]  # "2026-05-20T00:..." -> "2026-05-20"
              return None

          def fetch_user(username):
              print(f"Fetching {username}...", flush=True)
              user = User(username)

              print(f"  Fetching diary...", flush=True)
              diary = user.get_diary()
              time.sleep(2)
              print(f"  Fetching films...", flush=True)
              all_films = user.get_films()

              diary_entries = []
              for log_id, entry in diary.get("entries", {}).items():
                  if not isinstance(entry, dict):
                      continue
                  actions = entry.get("actions", {})
                  if not isinstance(actions, dict):
                      actions = {}
                  rating = actions.get("rating")
                  diary_entries.append({
                      "name": entry.get("name"),
                      "year": entry.get("release"),
                      "slug": entry.get("slug", ""),
                      "rating": rating,
                      "review": actions.get("reviewed", False),
                      "date": parse_date(entry.get("date")),
                  })

              rated_films = []
              for slug, film in all_films.get("movies", {}).items():
                  if not isinstance(film, dict):
                      continue
                  rating = film.get("rating")
                  if rating is not None:
                      rated_films.append({
                          "name": film.get("name"),
                          "year": film.get("year"),
                          "slug": slug,
                          "rating": rating,
                      })

              print(f"  {username}: {len(diary_entries)} diary, {len(rated_films)} rated", flush=True)
              return {
                  "username": username,
                  "diary_count": len(diary_entries),
                  "rated_count": len(rated_films),
                  "diary": diary_entries,
                  "rated_films": sorted(rated_films, key=lambda f: f["rating"], reverse=True),
              }

          usernames = [u.strip() for u in "${{ github.event.inputs.usernames }}".split(",")]
          results = []
          for u in usernames:
              try:
                  results.append(fetch_user(u))
              except Exception:
                  print(f"  ERROR for {u}:", flush=True)
                  traceback.print_exc()
                  results.append({"username": u, "error": traceback.format_exc()})
              if u != usernames[-1]:
                  time.sleep(3)

          with open("user_data.json", "w") as f:
              json.dump(results, f, indent=2)
          print("Done!")
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: letterboxd-user-data
          path: user_data.json
