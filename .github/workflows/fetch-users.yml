name: Fetch Letterboxd Users

on:
  workflow_dispatch:
    inputs:
      usernames:
        description: 'Comma-separated Letterboxd usernames'
        required: true
        default: 'onthebay,ben2610,soham3'

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Debug structure
        run: |
          python3 - <<'PYEOF'
          import json
          from letterboxdpy.user import User
          user = User("onthebay")
          films = user.get_films()
          # Print top-level keys
          print("Top keys:", list(films.keys())[:5])
          # Print first few movies entries
          movies = films.get("movies", {})
          for i, (k, v) in enumerate(movies.items()):
              print(f"  key={k!r}, type={type(v).__name__}, value={v!r}")
              if i >= 3:
                  break
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: letterboxd-debug
          path: "*.json"
